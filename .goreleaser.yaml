version: 2

project_name: ollygarden

before:
  hooks:
    - go mod tidy

builds:
  - id: ollygarden
    main: ./cmd/ollygarden
    binary: ollygarden
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.date={{.Date}}

archives:
  - id: default
    ids:
      - ollygarden
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]
    files:
      - README.md
      - LICENSE
      - NOTICE

checksum:
  name_template: checksums.txt
  algorithm: sha256

# Detached GPG signature over checksums.txt.
# Requires secrets: GPG_PRIVATE_KEY (ASCII-armored), GPG_FINGERPRINT, GPG_PASSPHRASE (optional).
# The release workflow imports the key before running goreleaser.
signs:
  - id: checksums
    artifacts: checksum
    cmd: gpg
    args:
      - "--batch"
      - "--yes"
      - "--pinentry-mode=loopback"
      - "--passphrase"
      - "{{ .Env.GPG_PASSPHRASE }}"
      - "--local-user"
      - "{{ .Env.GPG_FINGERPRINT }}"
      - "--output"
      - "${signature}"
      - "--detach-sign"
      - "${artifact}"

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  use: github
  groups:
    - title: Features
      regexp: "^feat(\\(.+\\))?!?:"
      order: 0
    - title: Fixes
      regexp: "^fix(\\(.+\\))?!?:"
      order: 1
    - title: Others
      order: 999
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"

release:
  draft: false
  prerelease: auto
  name_template: "v{{ .Version }}"
